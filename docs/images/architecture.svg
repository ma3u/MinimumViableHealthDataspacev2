<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700" role="img" aria-label="Health Dataspace v2 Five-Layer Architecture: Marketplace, HealthDCAT-AP, FHIR R4, OMOP CDM, Ontology on Neo4j graph database">
