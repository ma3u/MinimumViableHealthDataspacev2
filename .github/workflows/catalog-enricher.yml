name: Catalog Enricher Deploy

# Build the mvhd-catalog-enricher image and create/update the ACA
# Container App. Long-running consumer: NATS core subscribe on
# `dataspace.catalog.raw` -> Neo4j MERGE federated HealthDataset nodes.
#
# Paired with:
# - services/catalog-crawler (Schedule Job) — publishes to same subject
# - services/neo4j-proxy — federated NLQ templates read the result
#
# Why CI, not local az: Microsoft.App/containerApps/write is PIM-gated
# for personal accounts (memory project_aca_job_write_via_ci).

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "services/catalog-enricher/**"
      - "scripts/azure/11-catalog-enricher.sh"
      - ".github/workflows/catalog-enricher.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: "catalog-enricher-deploy"
  cancel-in-progress: false

env:
  ACR_NAME: acrmvhdehds
  ACR_LOGIN_SERVER: acrmvhdehds.azurecr.io
  RESOURCE_GROUP: rg-mvhd-dev
  ACA_ENV: mvhd-env
  APP_NAME: mvhd-catalog-enricher
  NATS_APP: mvhd-nats
  NEO4J_APP: mvhd-neo4j

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & push enricher image
        run: |
          docker buildx build --platform linux/amd64 \
            -t "${{ env.ACR_LOGIN_SERVER }}/${{ env.APP_NAME }}:latest" \
            -t "${{ env.ACR_LOGIN_SERVER }}/${{ env.APP_NAME }}:${{ github.sha }}" \
            --push ./services/catalog-enricher

      - name: "Create or update ACA Container App"
        run: |
          ACR_PASSWORD=$(az acr credential show --name "${{ env.ACR_NAME }}" \
            --query "passwords[0].value" -o tsv)

          COMMON_ENV=(
            "NATS_URL=nats://${{ env.NATS_APP }}:4222"
            "NATS_SUBJECT=dataspace.catalog.raw"
            "NATS_CONSUMER=enricher"
            "NEO4J_URI=bolt://${{ env.NEO4J_APP }}:7687"
            "NEO4J_USER=neo4j"
            "NEO4J_PASSWORD=healthdataspace"
            "METRICS_PORT=9464"
            "LOG_LEVEL=INFO"
          )

          if az containerapp show --name "${{ env.APP_NAME }}" \
               --resource-group "${{ env.RESOURCE_GROUP }}" -o none 2>/dev/null; then
            az containerapp update \
              --name "${{ env.APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --image "${{ env.ACR_LOGIN_SERVER }}/${{ env.APP_NAME }}:${{ github.sha }}" \
              --cpu 0.25 --memory 0.5Gi \
              --min-replicas 1 --max-replicas 1 \
              --set-env-vars "${COMMON_ENV[@]}" \
              -o none
          else
            az containerapp create \
              --name "${{ env.APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --environment "${{ env.ACA_ENV }}" \
              --image "${{ env.ACR_LOGIN_SERVER }}/${{ env.APP_NAME }}:${{ github.sha }}" \
              --registry-server "${{ env.ACR_LOGIN_SERVER }}" \
              --registry-username "${{ env.ACR_NAME }}" \
              --registry-password "$ACR_PASSWORD" \
              --cpu 0.25 --memory 0.5Gi \
              --min-replicas 1 --max-replicas 1 \
              --ingress disabled \
              --env-vars "${COMMON_ENV[@]}" \
              -o none
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Catalog Enricher Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ env.ACR_LOGIN_SERVER }}/${{ env.APP_NAME }}:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Subject: \`dataspace.catalog.raw\` (core NATS, no persistence)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Min/Max replicas: 1/1 (single-consumer, no scale-out)" >> "$GITHUB_STEP_SUMMARY"
