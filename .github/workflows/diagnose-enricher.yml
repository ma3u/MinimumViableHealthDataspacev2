name: Diagnose Catalog Enricher

# One-off diagnostic dispatched from GHA (since local az session expires
# every 4h under our tenant's Conditional Access). Prints the enricher's
# replica status + last 100 console lines.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-mvhd-dev
  APP_NAME: mvhd-catalog-enricher

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Replica status
        run: |
          REV=$(az containerapp show --name "${{ env.APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "properties.latestRevisionName" -o tsv)
          echo "Latest revision: $REV"
          az containerapp replica list --name "${{ env.APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --revision "$REV" \
            --query "[].{name:name,runningState:properties.runningState,runningStateDetails:properties.runningStateDetails}" \
            -o table || true

      - name: Container logs (console, tail 200)
        run: |
          az containerapp logs show \
            --name "${{ env.APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --type console \
            --tail 200 || true
