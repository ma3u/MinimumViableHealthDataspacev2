name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/healthdataspace
          NEO4J_PLUGINS: "[]"
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p healthdataspace 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: ./ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./ui/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next

      - name: Install dependencies
        run: npm ci

      # ── Seed Neo4j and refresh mock fixtures ─────────────────────
      - name: Install cypher-shell
        working-directory: .
        run: |
          wget -q https://dist.neo4j.org/cypher-shell/cypher-shell-5.26.0.zip -O /tmp/cs.zip
          unzip -q /tmp/cs.zip -d /tmp/cs
          echo "/tmp/cs/cypher-shell-5.26.0/bin" >> "$GITHUB_PATH"

      - name: Seed Neo4j with schema and synthetic data
        working-directory: .
        run: |
          cypher-shell -u neo4j -p healthdataspace -a bolt://localhost:7687 < neo4j/init-schema.cypher
          cypher-shell -u neo4j -p healthdataspace -a bolt://localhost:7687 < neo4j/insert-synthetic-schema-data.cypher

      - name: Start Next.js server for mock generation
        run: |
          npx next build
          npx next start -p 3000 &
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/graph > /dev/null 2>&1 && break
            sleep 2
          done
        env:
          NEXT_PUBLIC_STATIC_EXPORT: "false"
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: healthdataspace
          NEXTAUTH_SECRET: ci-mock-generation
          NEXTAUTH_URL: http://localhost:3000

      - name: Refresh mock fixtures from live API
        working-directory: .
        run: ./scripts/refresh-mocks.sh http://localhost:3000

      - name: Stop Next.js server
        run: |
          # Kill anything still bound to :3000 — lsof alone is unreliable in CI.
          pkill -f "next-server" 2>/dev/null || true
          pkill -f "next start" 2>/dev/null || true
          fuser -k 3000/tcp 2>/dev/null || true
          lsof -t -i:3000 2>/dev/null | xargs -r kill -9 2>/dev/null || true
          # Wait for the port to be released before the next step starts Next.js again.
          for i in $(seq 1 10); do
            if ! lsof -i:3000 > /dev/null 2>&1; then
              echo "Port 3000 is free"
              break
            fi
            sleep 1
          done

      - name: Run unit tests with coverage
        run: npx vitest run --coverage --reporter=json --outputFile=test-results.json
        continue-on-error: true

      # --- Playwright E2E Report ---
      - name: Build for E2E tests
        run: npx next build
        env:
          NEXT_PUBLIC_STATIC_EXPORT: "false"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test --project=chromium
        continue-on-error: true
        env:
          CI: true
          NEXT_PUBLIC_STATIC_EXPORT: "false"
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: healthdataspace
          NEXTAUTH_SECRET: ci-test-secret-not-for-production
          NEXTAUTH_URL: http://localhost:3000

      - name: WCAG 2.2 AA accessibility audit
        run: npx playwright test __tests__/e2e/journeys/27-wcag-accessibility.spec.ts --project=chromium
        continue-on-error: true
        env:
          CI: true
          NEXT_PUBLIC_STATIC_EXPORT: "false"
          NEXTAUTH_SECRET: ci-test-secret-not-for-production
          NEXTAUTH_URL: http://localhost:3000

      - name: Security & penetration tests (OWASP/BSI)
        run: npx playwright test __tests__/e2e/journeys/28-security-pentest.spec.ts --project=chromium --grep-invert "SEC-4[1-9]|SEC-50"
        continue-on-error: true
        env:
          CI: true
          NEXT_PUBLIC_STATIC_EXPORT: "false"
          NEXTAUTH_SECRET: ci-test-secret-not-for-production
          NEXTAUTH_URL: http://localhost:3000

      # --- Static Export for Pages ---
      - name: Disable API routes for static export
        run: mv src/app/api /tmp/api_disabled || true

      - name: Build with Next.js
        run: npx next build
        env:
          NEXT_PUBLIC_STATIC_EXPORT: "true"

      - name: Copy test reports to output (CI-generated)
        run: |
          mkdir -p out/test-reports out/ci-e2e-report
          # Vitest coverage
          cp -r coverage/ out/test-reports/coverage/ 2>/dev/null || true
          cp test-results.json out/test-reports/ 2>/dev/null || true
          # CI Playwright report goes to ci-e2e-report/ (chromium-only).
          # The committed public/e2e-report/ (live + chromium from JAD stack)
          # is already in out/e2e-report/ via Next.js static export.
          cp -r playwright-report/* out/ci-e2e-report/ 2>/dev/null || true
          # Generate comprehensive test report dashboard
          node ../scripts/generate-test-report-page.js . out/test-reports || echo "Report generation skipped"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ui/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
