name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./ui/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npx vitest run --coverage --reporter=json --outputFile=test-results.json
        continue-on-error: true

      # --- Playwright E2E Report ---
      - name: Build for E2E tests
        run: npx next build
        env:
          NEXT_PUBLIC_STATIC_EXPORT: "false"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test
        continue-on-error: true
        env:
          CI: true
          NEXT_PUBLIC_STATIC_EXPORT: "false"
          NEXTAUTH_SECRET: ci-test-secret-not-for-production
          NEXTAUTH_URL: http://localhost:3000

      # --- Static Export for Pages ---
      - name: Disable API routes for static export
        run: mv src/app/api /tmp/api_disabled || true

      - name: Build with Next.js
        run: npx next build
        env:
          NEXT_PUBLIC_STATIC_EXPORT: "true"

      - name: Copy test reports and E2E report to output
        run: |
          mkdir -p out/test-reports out/e2e-report
          # Vitest coverage
          cp -r coverage/ out/test-reports/coverage/ 2>/dev/null || true
          cp test-results.json out/test-reports/ 2>/dev/null || true
          # Playwright HTML report
          cp -r playwright-report/* out/e2e-report/ 2>/dev/null || true
          # Generate test report index
          node -e "
          const fs = require('fs');
          const r = JSON.parse(fs.readFileSync('test-results.json','utf8'));
          const cov = (() => { try { return JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8')); } catch { return null; } })();
          const total = cov?.total || {};
          const passed = r.numPassedTests || 0;
          const failed = r.numFailedTests || 0;
          const files = r.numPassedTestSuites || 0;
          const html = \`<!DOCTYPE html>
          <html lang='en'><head><meta charset='utf-8'/>
          <title>Test Report — Health Dataspace v2</title>
          <style>
          body{font-family:system-ui,-apple-system,sans-serif;max-width:900px;margin:2rem auto;padding:0 1rem;color:#e2e8f0;background:#0f172a}
          h1{color:#818cf8}h2{color:#a5b4fc;margin-top:2rem}
          table{border-collapse:collapse;width:100%;margin:1rem 0}
          th,td{border:1px solid #334155;padding:0.5rem 1rem;text-align:left}
          th{background:#1e293b;color:#94a3b8}
          .pass{color:#4ade80}.fail{color:#f87171}.warn{color:#fbbf24}
          a{color:#818cf8}
          .badge{display:inline-block;padding:0.25rem 0.75rem;border-radius:9999px;font-weight:600;font-size:0.875rem}
          .badge-green{background:#064e3b;color:#4ade80}.badge-red{background:#450a0a;color:#f87171}
          .badge-blue{background:#1e1b4b;color:#818cf8}
          </style></head><body>
          <h1>Test Report — Health Dataspace v2</h1>
          <p>Generated: \${new Date().toISOString().split('T')[0]}</p>
          <h2>Summary</h2>
          <table><tr><th>Metric</th><th>Value</th></tr>
          <tr><td>Test Files</td><td>\${files}</td></tr>
          <tr><td>Tests Passed</td><td class='pass'>\${passed}</td></tr>
          <tr><td>Tests Failed</td><td class='\${failed>0?\"fail\":\"pass\"}'>\${failed}</td></tr>
          <tr><td>Statements</td><td>\${total.statements?.pct ?? '—'}%</td></tr>
          <tr><td>Branches</td><td>\${total.branches?.pct ?? '—'}%</td></tr>
          <tr><td>Functions</td><td>\${total.functions?.pct ?? '—'}%</td></tr>
          <tr><td>Lines</td><td>\${total.lines?.pct ?? '—'}%</td></tr>
          </table>
          <h2>Reports</h2>
          <ul>
          <li><a href='coverage/index.html'>Detailed Coverage Report →</a></li>
          <li><a href='../e2e-report/'>Playwright E2E Report →</a></li>
          <li><a href='../e2e-report/ehds-journey.html'>EHDS Journey Report →</a></li>
          </ul>
          <h2>Links</h2>
          <ul>
          <li><a href='https://github.com/ma3u/MinimumViableHealthDataspacev2/actions/workflows/test.yml'>CI Test Suite</a></li>
          <li><a href='../docs/developer'>Developer Guide</a></li>
          </ul>
          </body></html>\`;
          fs.writeFileSync('out/test-reports/index.html', html);
          console.log('Test report: ' + passed + ' passed, ' + failed + ' failed, ' + files + ' files');
          " 2>/dev/null || echo "Report generation skipped"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ui/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
