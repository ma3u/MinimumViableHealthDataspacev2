# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^jad/openapi/
        args: ["--allow-multiple-documents"]
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=5000"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ["--severity=error"]
        exclude: ^jad/openapi/

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker

  # Flexible linter/formatter suitable for Markdown, JS, TS, YAML, and JSON.
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown]
        exclude: ^jad/openapi/
        additional_dependencies:
          - prettier@3.1.0

  # TypeScript type-checking — catches type errors in source files before commit
  - repo: local
    hooks:
      - id: tsc-ui
        name: TypeScript (UI)
        language: system
        entry: bash -c 'cd ui && npx tsc --noEmit --project tsconfig.build.json'
        files: ^ui/src/.*\.(ts|tsx)$
        pass_filenames: false

  # ESLint — catches type errors and code-quality issues pre-push
  - repo: local
    hooks:
      - id: eslint-ui
        name: ESLint (UI)
        language: system
        entry: bash -c 'cd ui && npx next lint --max-warnings 55'
        files: ^ui/src/.*\.(ts|tsx)$
        pass_filenames: false

  # Unit tests — ensure tests pass before push
  - repo: local
    hooks:
      - id: vitest-ui
        name: Vitest (UI)
        language: system
        entry: bash -c 'cd ui && npx vitest run --bail 1'
        files: ^ui/(src|__tests__)/.*\.(ts|tsx)$
        pass_filenames: false
        stages: [pre-push]

  # Secret scanning — gitleaks on staged diff (BSI C5 DEV-08)
  # Catches tokens/passwords before they reach CI or remote.
  # Requires: brew install gitleaks
  - repo: local
    hooks:
      - id: gitleaks
        name: Secret Scan (gitleaks)
        language: system
        entry: bash -c 'command -v gitleaks >/dev/null 2>&1 && gitleaks protect --staged --no-banner || echo "[WARN] gitleaks not installed — skipping (brew install gitleaks)"'
        pass_filenames: false
        stages: [pre-commit]

  # Broken link checker for Markdown files
  # Checks that local links, images, and anchors resolve to real files/paths.
  # Requires: npm i -g markdown-link-check  (or: brew install lychee)
  - repo: local
    hooks:
      - id: check-broken-links-md
        name: Broken links (Markdown)
        language: system
        entry: 'bash -c ''if command -v lychee >/dev/null 2>&1; then lychee --no-progress --offline "$@"; elif command -v markdown-link-check >/dev/null 2>&1; then for f in "$@"; do markdown-link-check --quiet "$f" || exit 1; done; else echo "[WARN] Neither lychee nor markdown-link-check installed"; fi'' --'
        files: \.(md|markdown)$
        stages: [pre-commit]

      - id: check-no-screenshot-imports
        name: No screenshot images in doc pages
        language: system
        entry: 'bash -c ''if grep -rl "images/screenshots" --include="*.tsx" ui/src/app/docs/ 2>/dev/null; then echo "ERROR: Doc pages must not reference screenshot images"; exit 1; fi'''
        files: ^ui/src/app/docs/.*\.tsx$
        pass_filenames: false
        stages: [pre-commit]

  # npm dependency audit — HIGH/CRITICAL CVEs on pre-push (BSI C5 DEV-05)
  # Requires: node/npm in PATH
  - repo: local
    hooks:
      - id: npm-audit-ui
        name: npm audit (UI — HIGH+)
        language: system
        entry: bash -c 'cd ui && npm audit --audit-level=high --omit=dev'
        pass_filenames: false
        stages: [pre-push]
