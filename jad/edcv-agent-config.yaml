# =============================================================================
# CFM EDC-V Agent Configuration (edcvagent.env format)
# =============================================================================
# Docker Compose equivalent of K8s edcv-agent-config ConfigMap.
# Flat key-value format expected by CFM Go binary (Viper).
# Mount as: /etc/appname/edcvagent.env
# =============================================================================

uri: nats://nats:4222
bucket: cfm-bucket
stream: cfm-stream
httpport: 8080
postgres: true
dsn: postgres://cfm:cfm@postgres:5432/cfm?sslmode=disable
vault.url: http://vault:8200
vault.path: secret
vault.clientId: provisioner
vault.clientSecret: provisioner-secret
vault.tokenUrl: http://keycloak:8080/realms/edcv/protocol/openid-connect/token
vault.softDelete: true
keycloak.clientID: provisioner
keycloak.clientSecret: provisioner-secret
keycloak.tokenUrl: http://keycloak:8080/realms/edcv/protocol/openid-connect/token
identityhub.url: http://identityhub:7081/api/identity
identityhub.sts.url: http://identityhub:7084/api/sts/token
identityhub.cs.url: http://identityhub:7082/api/credentials/v1/participants/%s
controlplane.url: http://controlplane:8081/api/mgmt
controlplane.protocol.url: http://controlplane:8082/api/dsp/%s/2025-1
