# =============================================================================
# CFM Provision Manager Configuration (pm.env format)
# =============================================================================
# Docker Compose equivalent of K8s pm-config ConfigMap.
# Flat key-value format expected by CFM Go binary (Viper).
# Mount as: /etc/appname/pm.env
# =============================================================================

uri: nats://nats:4222
bucket: cfm-bucket
stream: cfm-stream
httpport: 8080
postgres: true
dsn: postgres://cfm:cfm@postgres:5432/cfm?sslmode=disable
