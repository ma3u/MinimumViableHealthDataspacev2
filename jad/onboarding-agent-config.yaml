# =============================================================================
# CFM Onboarding Agent Configuration (obagent.env format)
# =============================================================================
# Docker Compose equivalent of K8s ob-agent-config ConfigMap.
# Flat key-value format expected by CFM Go binary (Viper).
# Mount as: /etc/appname/obagent.env
# =============================================================================

uri: nats://nats:4222
bucket: cfm-bucket
stream: cfm-stream
httpport: 8080
postgres: true
dsn: postgres://cfm:cfm@postgres:5432/cfm?sslmode=disable
keycloak.tokenUrl: http://keycloak:8080/realms/edcv/protocol/openid-connect/token
keycloak.clientId: admin
keycloak.clientSecret: edc-v-admin-secret
identityhub.url: http://identityhub:7081/api/identity
issuerservice.url: http://issuerservice:10013/api/admin
issuer.id: issuer
